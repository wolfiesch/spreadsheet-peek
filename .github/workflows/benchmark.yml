name: Benchmark

# Re-measure token costs on every PR that touches SKILL.md, the benchmark
# harness, or the sample spreadsheet. Posts a comment if the numbers moved
# vs master so drifts in the token-efficiency claims can't ship silently.
#
# Security: uses `pull_request` (not `pull_request_target`), so forked-PR
# code runs with zero write permissions to the base repo and no secrets.

on:
  pull_request:
    paths:
      - "SKILL.md"
      - "README.md"
      - "benchmarks/**"
      - "docs/**"
      - "examples/**"
      - "CLAUDE.md"
      - ".claude-plugin/**"
      - ".github/workflows/benchmark.yml"

permissions:
  pull-requests: write
  contents: read

env:
  # Pin wolfxl-cli version here. Bump when upstream releases changes affect output.
  # The workflow reads this value from each checkout, so CLI bump PRs compare the
  # proposed PR binary against master's current baseline binary.
  # Verified against crates.io on 2026-04-22; bump via `cargo search wolfxl-cli`.
  WOLFXL_CLI_VERSION: "0.8.0"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          path: main

      - name: Resolve wolfxl-cli versions
        id: wolfxl-versions
        run: |
          pr_version="$(awk -F'"' '/WOLFXL_CLI_VERSION:/ { print $2; exit }' pr/.github/workflows/benchmark.yml)"
          main_version="$(awk -F'"' '/WOLFXL_CLI_VERSION:/ { print $2; exit }' main/.github/workflows/benchmark.yml)"

          if [ -z "$pr_version" ] || [ -z "$main_version" ]; then
            echo "Could not resolve WOLFXL_CLI_VERSION from workflow files" >&2
            exit 1
          fi

          echo "pr=${pr_version}" >> "$GITHUB_OUTPUT"
          echo "main=${main_version}" >> "$GITHUB_OUTPUT"
          echo "PR wolfxl-cli: ${pr_version}"
          echo "master wolfxl-cli: ${main_version}"

      - name: Cache wolfxl binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/spreadsheet-peek/wolfxl-cli
            ~/.cargo/registry
            ~/.cargo/git
          key: wolfxl-cli-${{ runner.os }}-${{ steps.wolfxl-versions.outputs.main }}-${{ steps.wolfxl-versions.outputs.pr }}
          restore-keys: |
            wolfxl-cli-${{ runner.os }}-

      - name: Install wolfxl-cli versions
        run: |
          install_wolfxl() {
            version="$1"
            root="$HOME/.cache/spreadsheet-peek/wolfxl-cli/${version}"
            wolfxl_bin="${root}/bin/wolfxl"

            if [ -x "$wolfxl_bin" ] && "$wolfxl_bin" --version | grep -F -q "$version"; then
              "$wolfxl_bin" --version
              return
            fi

            cargo install wolfxl-cli --version "$version" --root "$root" --force
          }

          install_wolfxl "${{ steps.wolfxl-versions.outputs.pr }}"
          install_wolfxl "${{ steps.wolfxl-versions.outputs.main }}"

      - name: Install Python deps
        run: python3 -m pip install --quiet tiktoken openpyxl

      - name: Make master benchmark pipe-safe
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path("main/benchmarks/measure_tokens.py")
          text = path.read_text()
          patched = re.sub(r"\| head -([0-9]+)", r'| sed -n "1,\1p"', text)
          if patched != text:
              path.write_text(patched)
              print("Patched master benchmark line limiting from head to sed.")
          else:
              print("Master benchmark already pipe-safe.")
          PY

      - name: Verify PR branch claims
        run: PATH="$HOME/.cache/spreadsheet-peek/wolfxl-cli/${{ steps.wolfxl-versions.outputs.pr }}/bin:$PATH" python3 pr/benchmarks/verify_claims.py

      - name: Run benchmark on PR branch
        run: |
          set -o pipefail
          PATH="$HOME/.cache/spreadsheet-peek/wolfxl-cli/${{ steps.wolfxl-versions.outputs.pr }}/bin:$PATH" python3 pr/benchmarks/measure_tokens.py | tee /tmp/pr.txt

      - name: Run benchmark on master
        run: |
          set -o pipefail
          PATH="$HOME/.cache/spreadsheet-peek/wolfxl-cli/${{ steps.wolfxl-versions.outputs.main }}/bin:$PATH" python3 main/benchmarks/measure_tokens.py | tee /tmp/main.txt

      - name: Diff benchmarks
        id: diff
        run: |
          if diff -u /tmp/main.txt /tmp/pr.txt > /tmp/bench.diff; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Benchmark unchanged vs master."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Benchmark changed vs master:"
            cat /tmp/bench.diff
          fi

      - name: Build comment body
        if: steps.diff.outputs.changed == 'true'
        run: |
          {
            echo '<!-- spreadsheet-peek-benchmark-drift -->'
            echo
            echo '### Benchmark drift detected'
            echo
            echo 'The token-cost numbers changed between `master` and this PR.'
            echo 'If this is expected (e.g. sample file grew), update `README.md`,'
            echo '`docs/how-it-works.md`, `benchmarks/README.md`, and `SKILL.md`'
            echo 'so the cited numbers match.'
            echo
            echo '<details><summary>master output</summary>'
            echo
            echo '```'
            cat /tmp/main.txt
            echo '```'
            echo '</details>'
            echo
            echo '<details open><summary>PR output</summary>'
            echo
            echo '```'
            cat /tmp/pr.txt
            echo '```'
            echo '</details>'
            echo
            echo '<details><summary>diff</summary>'
            echo
            echo '```diff'
            cat /tmp/bench.diff
            echo '```'
            echo '</details>'
          } > /tmp/comment.md

      - name: Find existing benchmark comment
        if: steps.diff.outputs.changed == 'true'
        id: benchmark-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- spreadsheet-peek-benchmark-drift -->'

      - name: Post or update PR comment
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.benchmark-comment.outputs.comment-id }}
          body-path: /tmp/comment.md
          edit-mode: replace
